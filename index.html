<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Tap Master</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #121212;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 800px;
            background: linear-gradient(to bottom, #1a472a, #2d7244);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .ui-layer {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            pointer-events: none;
        }
        .score-box { color: #ffd700; }
        
        /* 弹窗基础样式 */
        #start-screen, #gameover-screen, #tutorial-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            transition: all 0.3s;
        }
        
        /* 新增：手势引导界面单独透明度，以便看清背景的击球区 */
        #tutorial-screen {
            background: rgba(0, 0, 0, 0.75);
            cursor: pointer;
        }

        h1 {
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 4px 10px rgba(255,215,0,0.3);
        }
        p {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
            line-height: 1.5;
        }
        .btn {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            animation: pulse 1.5s infinite;
        }

        /* 新增：手指点击动效 */
        .finger-icon {
            font-size: 60px;
            animation: tapAnimation 1.2s infinite;
            margin-top: 20px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes tapAnimation {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            50% { transform: scale(0.8) translateY(10px); opacity: 0.5; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .hide { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- UI 计数 -->
    <div class="ui-layer">
        <div class="score-box">RUNS: <span id="score">0</span></div>
        <div style="color: #ff4757;">WICKET: <span id="lives">3</span></div>
    </div>

    <!-- 开始界面 -->
    <div id="start-screen">
        <h1>CRICKET MASTER</h1>
        <p>南亚最火爆的板球小游戏！</p>
        <button class="btn" onclick="showTutorial()">PLAY NOW</button>
    </div>

    <!-- 新增：游戏玩法说明引导层 -->
    <div id="tutorial-screen" class="hide" onclick="enterGameTotal()">
        <h1 style="color: #00ff88; font-size: 28px;">HOW TO PLAY</h1>
        <p style="color: #fff; font-size: 18px;">
            1. 看到红色的<span style="color:#ff4757; font-weight:bold;">板球</span>掉落下来<br>
            2. 当球到达底部的<span style="color:#ffd700; font-weight:bold;">黄色黄金击球区</span>时<br>
            3. <span style="color:#00ff88; font-weight:bold;">点击屏幕任意地方</span>挥棒击球！
        </p>
        <div class="finger-icon"></div>
        <p style="color: #ffd700; font-size: 14px; margin-top: 20px; animation: pulse 1s infinite;">
            【 点击任意位置开始比赛 】
        </p>
    </div>

    <!-- 结束界面 -->
    <div id="gameover-screen" class="hide">
        <h1>GAME OVER</h1>
        <p style="font-size: 24px;">Your Final Score:<br><span id="final-score" style="color: #ffd700; font-size: 40px;">0</span> Runs</p>
        <button class="btn" onclick="showTutorial()">TRY AGAIN</button>
    </div>

    <!-- 游戏画布 -->
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI 元素
    const startScreen = document.getElementById('start-screen');
    const tutorialScreen = document.getElementById('tutorial-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const finalScoreEl = document.getElementById('final-score');

    // 游戏状态
    let score = 0;
    let lives = 3;
    let isPlaying = false;
    let animationFrameId;

    // 游戏配置
    let ball = { x: 0, y: 0, radius: 14, speed: 5, active: false };
    let hitZone = { y: 0, height: 60 }; // 击球黄金区域
    let batAngle = 0; // 球棒挥动动画角度
    let isSwinging = false;
    let feedbackText = "";
    let feedbackTimer = 0;
    let feedbackColor = "#fff";

    // 适配高分辨率屏幕
    function resize() {
        const rect = canvas.parentNode.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        hitZone.y = canvas.height * 0.75; // 击球区设在下方 3/4 处
    }
    window.addEventListener('resize', resize);
    resize();

    // 第一步：点击Play Now后，显示玩法说明，并先渲染出游戏背景让玩家有代入感
    function showTutorial() {
        startScreen.classList.add('hide');
        gameoverScreen.classList.add('hide');
        tutorialScreen.classList.remove('hide');
        
        // 重置分数
        score = 0;
        lives = 3;
        scoreEl.innerText = score;
        livesEl.innerText = lives;

        // 静止绘制一次背景和击球区，让玩家对照说明看懂“黄金击球区”在哪
        drawStaticBackground();
    }

    // 第二步：点击引导层，正式生成球并开始游戏
    function enterGameTotal() {
        tutorialScreen.classList.add('hide');
        isPlaying = true;
        spawnBall();
        if(animationFrameId) cancelAnimationFrame(animationFrameId);
        update();
    }

    // 生成新球
    function spawnBall() {
        ball.x = canvas.width / 2;
        ball.y = -50; 
        ball.speed = 5 + Math.floor(score / 20); // 速度随分数递增
        ball.active = true;
    }

    // 监听点击/触摸事件（挥棒）
    window.addEventListener('pointerdown', (e) => {
        // 如果不在游戏状态，或者点到了按钮和引导层，不触发挥棒
        if (!isPlaying || isSwinging || e.target.tagName === 'BUTTON' || e.target.id === 'tutorial-screen' || e.target.closest('#tutorial-screen')) return;
        
        isSwinging = true;
        batAngle = -45; // 开始挥棒角度

        // 判定击球时机
        if (ball.active) {
            let distanceToZone = Math.abs((ball.y) - (hitZone.y + hitZone.height/2));
            
            if (ball.y >= hitZone.y && ball.y <= (hitZone.y + hitZone.height)) {
                if (distanceToZone < 15) {
                    showFeedback(" PERFECT! SIX!", "#ffd700");
                    score += 6;
                } else {
                    showFeedback(" GOOD! 4 RUNS", "#00ff88");
                    score += 4;
                }
                ball.active = false; 
            } else {
                showFeedback(" MISSED!", "#ff4757");
                lives--;
                ball.active = false;
            }
            scoreEl.innerText = score;
            
            if (lives <= 0) {
                endGame();
            }
        }
    });

    function showFeedback(text, color) {
        feedbackText = text;
        feedbackColor = color;
        feedbackTimer = 40; 
    }

    function endGame() {
        isPlaying = false;
        finalScoreEl.innerText = score;
        gameoverScreen.classList.remove('hide');
    }

    // 绘制静止背景（用于教学看盘）
    function drawStaticBackground() {
        ctx.fillStyle = '#2d7244';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e4ca9b';
        ctx.fillRect(canvas.width/2 - 40, 0, 80, canvas.height);
        ctx.fillStyle = 'rgba(255, 215, 0, 0.4)';
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 3;
        ctx.fillRect(0, hitZone.y, canvas.width, hitZone.height);
        ctx.strokeRect(0, hitZone.y, canvas.width, hitZone.height);
        
        // 绘制静止的球棒
        ctx.save();
        ctx.translate(canvas.width / 2 - 50, hitZone.y + hitZone.height / 2);
        ctx.fillStyle = '#d7a15c';
        ctx.fillRect(0, -10, 70, 16);
        ctx.fillStyle = '#333';
        ctx.fillRect(-20, -6, 20, 8);
        ctx.restore();
    }

    // 主渲染循环
    function update() {
        if (!isPlaying) return;

        // 1. 绘制草坪背景
        ctx.fillStyle = '#2d7244';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. 绘制投球球道 (Pitch)
        ctx.fillStyle = '#e4ca9b';
        ctx.fillRect(canvas.width/2 - 40, 0, 80, canvas.height);

        // 3. 绘制黄色击球黄金区域 (Hit Zone)
        ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 3;
        ctx.fillRect(0, hitZone.y, canvas.width, hitZone.height);
        ctx.strokeRect(0, hitZone.y, canvas.width, hitZone.height);

        // 4. 移动和绘制球
        if (ball.active) {
            ball.y += ball.speed;
            
            if (ball.y > canvas.height + 20) {
                showFeedback(" BOWLED!", "#ff4757");
                lives--;
                livesEl.innerText = lives;
                if (lives <= 0) endGame();
                else spawnBall();
            }

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#b31010';
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, -Math.PI/4, Math.PI/4);
            ctx.stroke();
        } else if (isPlaying) {
            spawnBall();
        }

        // 5. 绘制板球木棒动画 (Bat)
        ctx.save();
        ctx.translate(canvas.width / 2 - 50, hitZone.y + hitZone.height / 2);
        if (isSwinging) {
            batAngle += 15; 
            if (batAngle > 45) {
                isSwinging = false;
                batAngle = 0;
            }
        }
        ctx.rotate(batAngle * Math.PI / 180);
        ctx.fillStyle = '#d7a15c';
        ctx.fillRect(0, -10, 70, 16);
        ctx.fillStyle = '#333'; 
        ctx.fillRect(-20, -6, 20, 8);
        ctx.restore();

        // 6. 绘制得分反馈
        if (feedbackTimer > 0) {
            ctx.fillStyle = feedbackColor;
            ctx.font = "italic bold 30px Arial";
            ctx.textAlign = "center";
            ctx.fillText(feedbackText, canvas.width / 2, hitZone.y - 40);
            feedbackTimer--;
        }

        animationFrameId = requestAnimationFrame(update);
    }
</script>

</body>
</html>
